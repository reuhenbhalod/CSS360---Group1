# GitHub Actions equivalent of scripts/cicd.sh.
#
# Runs on every push to main, every PR targeting main, and on demand
# from the Actions tab. Mirrors the six stages of the hand-built
# pipeline but skips the "deploy to local Docker" stage (CI doesn't
# need a long-running deployment; it builds the image and runs a
# smoke test inside compose to prove it can deploy).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Pull (implicit via checkout)
      - name: 1️⃣  Pull latest code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: npm install --legacy-peer-deps

      # 2. Static analysis (eslint + ruff)
      - name: 2️⃣  Static analysis — ruff (backend)
        run: ruff check backend --exclude .venv --exclude __pycache__

      - name: 2️⃣  Static analysis — eslint (frontend)
        run: npm run lint

      # 3. Tests (unit + integration + smoke)
      - name: 3️⃣  Backend tests (pytest — unit + integration)
        working-directory: backend
        run: python -m pytest test_ingestion.py -v

      - name: 3️⃣  Frontend tests (vitest — unit)
        run: npm test -- --run

      - name: 3️⃣  Pre-deploy smoke (boot backend, hit /api/health)
        working-directory: backend
        run: |
          python main.py &
          SERVER_PID=$!
          for i in {1..20}; do
            if curl -fs http://localhost:8000/api/health; then break; fi
            sleep 1
          done
          curl -f http://localhost:8000/api/health
          kill $SERVER_PID

      # 4. Package
      - name: 4️⃣  Package — docker compose build
        # Write API keys from GitHub Actions Secrets into backend/.env so
        # the compose stack can reach the real upstream APIs. Any secret
        # left unset in repo settings becomes a blank line and that source
        # gracefully degrades to ok:false rather than failing the build.
        env:
          FOURSQUARE_API_KEY: ${{ secrets.FOURSQUARE_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: |
          cat > backend/.env <<EOF
          FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY}
          GNEWS_API_KEY=${GNEWS_API_KEY}
          GUARDIAN_API_KEY=${GUARDIAN_API_KEY}
          REDDIT_USER_AGENT=goodeats/0.5 (class project)
          EOF
          docker compose build

      # 5. Deploy (to ephemeral CI container, then tear down)
      - name: 5️⃣  Deploy — docker compose up -d
        run: docker compose up -d

      # 6. Verify
      - name: 6️⃣  Verify — wait for healthy + curl endpoints
        run: |
          for i in {1..30}; do
            HEALTH="$(docker inspect --format='{{.State.Health.Status}}' goodeats-backend 2>/dev/null || echo unknown)"
            if [[ "$HEALTH" == "healthy" ]]; then echo "backend healthy"; break; fi
            sleep 2
          done
          curl -f http://localhost:8000/api/health | grep '"ok":true'
          curl -f -o /dev/null http://localhost:8080
          echo "✓ deployment verified"

      - name: Teardown
        if: always()
        run: docker compose down -v
